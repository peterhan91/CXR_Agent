# CXR Agent Configuration — Grounded Report Generation
# Active servers (12 tools): CheXagent-2 (5), CheXOne, MedGemma (2), CheXzero, CXR Foundation, BiomedParse, FactCheXcker
# Disabled: MedVersa (hallucinating), MedSAM (poor CXR quality), MedSAM3 (replaced)

agent:
  model: "claude-sonnet-4-6"
  max_iterations: 15
  max_tokens: 4096
  temperature: 0.0
  reasoning_effort: "medium"

clear:
  model_path: "../cxr_concept/CheXzero/checkpoints/dinov2-multi-v1.0_vitb/best_model.pt"
  concepts_path: "../cxr_concept/CheXzero/concepts/mimic_concepts.csv"
  dinov2_model_name: "dinov2_vitb14"
  image_resolution: 448
  top_k: 20

tools:
  # Report generators
  chexagent2:
    enabled: true
    endpoint: "http://localhost:8001"
  chexagent2_srrg:
    enabled: true
    endpoint: "http://localhost:8001"
  chexone:
    enabled: true
    endpoint: "http://localhost:8002"

  # MedGemma (VQA + report)
  medgemma_vqa:
    enabled: true
    endpoint: "http://localhost:8010"
  medgemma_report:
    enabled: true
    endpoint: "http://localhost:8010"

  # Classification
  chexagent2_classify:
    enabled: true
    endpoint: "http://localhost:8001"
  chexzero:
    enabled: true
    endpoint: "http://localhost:8009"
  cxr_foundation:
    enabled: true
    endpoint: "http://localhost:8008"

  # Grounding (bounding boxes for findings)
  chexagent2_grounding:
    enabled: true
    endpoint: "http://localhost:8001"

  # VQA
  chexagent2_vqa:
    enabled: true
    endpoint: "http://localhost:8001"

  # MedVersa — DISABLED (produces hallucinated outputs)
  medversa:
    enabled: false
    endpoint: "http://localhost:8004"
  medversa_classify:
    enabled: false
    endpoint: "http://localhost:8004"
  medversa_detect:
    enabled: false
    endpoint: "http://localhost:8004"
  medversa_segment:
    enabled: false
    endpoint: "http://localhost:8004"
  medversa_vqa:
    enabled: false
    endpoint: "http://localhost:8004"

  # Segmentation
  biomedparse:
    enabled: true
    endpoint: "http://localhost:8005"
  medsam:
    enabled: false
    endpoint: "http://localhost:8009"
  medsam3:
    enabled: false
    endpoint: "http://localhost:8006"

  # Verification
  factchexcker:
    enabled: true
    endpoint: "http://localhost:8007"

skill:
  enabled: true
  path: null

logging:
  level: "INFO"
  save_trajectories: true
  trajectory_dir: "trajectories/"
